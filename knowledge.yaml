# kcp-agent eats its own dogfood — this manifest makes the reference agent's
# repository navigable by any KCP agent, including itself:
#
#   node dist/cli.js plan "how does the planner score units?" --manifest .
#
# test/manifest.test.ts keeps this file honest: it parses the manifest, checks
# every unit path exists on disk, and runs a plan against it.

kcp_version: "0.26"
project: kcp-agent
version: 0.18.0
updated: "2026-07-23"
language: en

trust:
  provenance:
    publisher: "eXOReaction AS / Cantara"

payment:
  default_tier: free
  methods:
    - type: free

units:
  - id: front-door
    path: README.md
    intent: "What is kcp-agent, how do I install it, and how do I run plan/ask against a knowledge.yaml?"
    scope: global
    audience: [agent, human]
    triggers: [overview, getting started, install, usage, native, binaries]
    hints: {load_strategy: eager}

  - id: planner
    path: src/planner.ts
    intent: "How the deterministic planner scores units by task, gates trust, filters temporally, selects federation refs, and budgets payment and rate limits"
    scope: project
    audience: [agent, developer]
    triggers: [planner, scoring, trust, temporal, federation, budget, load plan]

  - id: kcp-model
    path: src/model.ts
    intent: "The compact KCP manifest model the agent consumes — units, trust, payment, rate limits, federation refs"
    scope: project
    audience: [agent, developer]
    triggers: [model, schema, manifest fields, types]

  - id: manifest-client
    path: src/client.ts
    intent: "How manifests are located and parsed from local paths, directories, and HTTPS URLs"
    scope: project
    audience: [agent, developer]
    triggers: [client, loading, parsing, yaml, discovery]

  - id: synthesis
    path: src/synthesize.ts
    intent: "How the optional Claude synthesis layer loads only the planned units and answers the task under the trusted-render posture"
    scope: project
    audience: [agent, developer]
    triggers: [synthesis, claude, llm, ask, answer]

  - id: cli
    path: src/cli.ts
    intent: "The CLI surface — plan, ask, validate, and mcp commands, their options, and output modes"
    scope: project
    audience: [agent, developer]
    triggers: [cli, commands, options, flags, json]

  - id: federation-follower
    path: src/follow.ts
    intent: "How eligible federation refs are fetched and planned recursively — fail-closed gating, cycle detection, depth limits, per-hop signature verification"
    scope: project
    audience: [agent, developer]
    triggers: [follow, federation, recursive, cycle, depth]

  - id: signature-verification
    path: src/verify.ts
    intent: "How ed25519 manifest signatures are verified over exact bytes — key formats, signature envelopes, key pinning, fail-closed policy"
    scope: project
    audience: [agent, developer]
    triggers: [signature, signing, verify, ed25519, trust key]

  - id: network-boundary
    path: src/fetch.ts
    intent: "How every remote fetch is guarded — SSRF/private-host refusal, https-only, manual redirect re-checking, fan-out and response-size ceilings, fail-closed by default"
    scope: project
    audience: [agent, developer]
    triggers: [ssrf, fetch, network, security, redirect, size limit, private host]

  - id: manifest-linter
    path: src/validate.ts
    intent: "How knowledge.yaml manifests are validated — structural errors vs navigation-weakening warnings"
    scope: project
    audience: [agent, developer]
    triggers: [validate, lint, errors, warnings]

  - id: decision-trace
    path: src/trace.ts
    intent: "How the decision trace re-walks every unit through the 14-gate cascade — structured GateVerdict annotations cross-validated against the canonical plan, making every skip a sentence not a silence"
    scope: project
    audience: [agent, developer]
    triggers: [trace, gate cascade, decision, audit trail, inspectable, gates]

  - id: plan-diff
    path: src/diff.ts
    intent: "How two saved plan artifacts are compared — moves between selected/skipped, score changes, presence shifts, budget shifts, reason changes; pure function, no I/O"
    scope: project
    audience: [agent, developer]
    triggers: [diff, compare, plan comparison, moves, changes, drift]

  - id: mcp-server
    path: src/mcp.ts
    intent: "How the planner is served to MCP clients over stdio — kcp_plan, kcp_load, kcp_validate, kcp_trace, kcp_replay tools"
    scope: project
    audience: [agent, developer]
    triggers: [mcp, server, tools, stdio, json-rpc]

  - id: answer-grounding
    path: src/ground.ts
    intent: "How each answer claim is grounded — attributed to a loaded, hash-pinned unit by a separate verifier, or surfaced as a gap; fail-closed on a citation to a unit that was not loaded"
    scope: project
    audience: [agent, developer]
    triggers: [ground, grounding, claim, verifier, citation, gap, unsubstantiated]

  - id: grounding-loop
    path: src/groundloop.ts
    intent: "How closed-loop grounding re-navigates for missing evidence — absorbing term gate, round cap, progress guard; oscillation is impossible and gaps are always surfaced"
    scope: project
    audience: [agent, developer]
    triggers: [ground rounds, closed loop, re-navigate, convergence, evidence]

  - id: episodic-memory
    path: src/memory.ts
    intent: "How episodic memory stores a plan/grounded-answer as a replayable artifact stripped of unit bytes — hash-addressed, content-free so recall can't bypass the access gate, replay-validated freshness on recall"
    scope: project
    audience: [agent, developer]
    triggers: [memory, remember, recall, episode, replay, freshness]

  - id: memory-reuse
    path: src/reuse.ts
    intent: "How memory-validated reuse works — a determinism cache that reuses a prior episode only if it matches exactly (task + manifest + options) and still replays clean today; fail-closed on any drift or unverifiable freshness"
    scope: project
    audience: [agent, developer]
    triggers: [reuse, cache, determinism, drift, fail-closed, cache hit]

  - id: session-dedup
    path: src/session.ts
    intent: "How MCP session dedup works — kcp_load withholds bytes the caller already holds (exact sha match), returning an unchanged stub; the server stays stateless and re-serves on any drift"
    scope: project
    audience: [agent, developer]
    triggers: [session, dedup, kcp_load, unchanged, token savings, mcp]

  - id: demo-manifest
    path: examples/demo-hub/knowledge.yaml
    intent: "A worked example manifest exercising every planner stage — trust gating, temporal validity, payment, rate limits, federation"
    scope: project
    audience: [agent, developer]
    triggers: [example, demo, sample manifest]

  - id: critique-loop
    path: src/loop.ts
    intent: "The audited LLM loop behind ask --loop — plan, metadata-only gap critique, deterministic term gate, re-plan; the model proposes, the plan disposes"
    scope: project
    audience: [agent, developer]
    triggers: [loop, critique, gap, term expansion, rounds, audit log]

  - id: navigator-skill
    path: skills/kcp-navigator/SKILL.md
    kind: skill
    intent: "Portable skill packaging the plan-first, fail-closed KCP navigation discipline for agents that drive the CLI themselves"
    scope: project
    audience: [agent]
    triggers: [skill, navigator, discipline, plan first]
    load_eligible: true
    action_scope:
      tools: ["shell.exec"]
      capabilities: ["kcp.navigate"]

  - id: demo-suite
    path: examples/demos.js
    intent: "Twenty narrated demo scenarios driving the real CLI — budget, supersession, auth-vs-payment gates, federation, plan diffing, the critique loop, answer grounding, the signature seal, the incident page, the summer plan, the milky-way estate, decision trace, dogfood, the confidence gate, governed skills — each CI-asserted"
    scope: project
    audience: [agent, developer]
    triggers: [demos, scenarios, showcase, newsstand, vault, audit]

  - id: incident-world
    path: examples/incident/README.md
    intent: "The 03:00 incident-response world — four federated parties (internal hub, signed national CERT, vendor, paid threat intel) exercising attestation, signatures, supersession, payment, and budget in one story"
    scope: project
    audience: [agent, developer]
    triggers: [incident, zero-day, cert, threat intel, tlp, response, use case]

  - id: milky-way-world
    path: examples/milky-way/README.md
    intent: "The Milky Way enterprise documentation estate — a signed hub over eight domains (env-sliced IT, quality with a future regulation, HSM-attested R&D, human-only HR docs, brand, CSRD handover, identity-gated ERP vendor) walked by five different agents"
    scope: project
    audience: [agent, developer]
    triggers: [enterprise, estate, milky-way, melkeveien, domains, documentation, use case]

  - id: arena-site
    path: docs/js/app.js
    intent: "The gh-pages arena — the real planner bundled unmodified for the browser, head-to-head against simulated archetypes; test/site.test.ts proves the bundle plans identically to the source"
    scope: project
    audience: [agent, developer]
    triggers: [site, arena, gh-pages, browser, bundle, showcase]

  - id: guide-navigable
    path: guides/make-your-repo-navigable.md
    intent: "Make any repository navigable by agents in ten minutes — author a first knowledge.yaml, lint it, and test it with real plans"
    scope: global
    audience: [agent, human]
    triggers: [guide, tutorial, authoring, first manifest, navigable, publish]

  - id: guide-signing
    path: guides/sign-your-manifest.md
    intent: "Sign a knowledge.yaml with ed25519 so agents can verify provenance — envelopes, key pinning, and the fail-closed lifecycle"
    scope: global
    audience: [agent, human]
    triggers: [guide, signing, sign manifest, provenance, envelope, trust key]

  - id: guide-mcp
    path: guides/wire-mcp-into-claude-code.md
    intent: "Serve the deterministic planner to Claude Code or any MCP client — register kcp-agent mcp and use kcp_plan, kcp_load, kcp_validate"
    scope: global
    audience: [agent, human]
    triggers: [guide, mcp, claude code, register, wire, integrate]

  - id: guide-quickstart
    path: guides/quickstart.md
    intent: "First ten minutes with kcp-agent — install, then plan, ask, validate, serve over MCP, and replay a saved artifact end to end"
    scope: global
    audience: [agent, human]
    triggers: [guide, quickstart, getting started, install, first steps, tutorial]

  - id: guide-memory
    path: guides/give-your-agent-memory.md
    intent: "Give an agent episodic memory — record answers as replayable byte-free episodes, recall by task overlap, verify by replay, and reuse only while they still hold"
    scope: global
    audience: [agent, human]
    triggers: [guide, memory, remember, recall, reuse, episode]

  - id: guide-dedup
    path: guides/cut-context-cost-with-dedup.md
    intent: "Cut a calling agent's context cost — pass known units to kcp_load so unchanged bytes come back as sha-confirmed stubs instead of being re-served"
    scope: global
    audience: [agent, human]
    triggers: [guide, dedup, session, kcp_load, known units, context cost, token savings]

  - id: guide-porting
    path: guides/build-a-conformant-implementation.md
    intent: "How to build a second KCP planner implementation (e.g. a Go port for a small static binary) — the deterministic pipeline as a spec, and validating against the conformance vectors"
    scope: global
    audience: [agent, developer]
    triggers: [guide, port, conformant, implementation, go, rust, second implementation, spec]

  - id: guide-trace
    path: guides/trace-your-decisions.md
    intent: "Trace every navigation decision — run plan --trace for the 14-gate cascade, save two plans and diff them, use kcp_trace over MCP"
    scope: global
    audience: [agent, human]
    triggers: [guide, trace, decision trace, diff, gate cascade, audit trail]

  - id: conformance-vectors
    path: vectors/README.md
    intent: "The spec conformance vector corpus — (manifest, task, options) → expected plan fixtures any KCP implementation must reproduce; the prerequisite for a second (e.g. Go) implementation"
    scope: global
    audience: [agent, developer]
    triggers: [conformance, vectors, corpus, port, second implementation, spec validation]

  - id: conformance-matrix
    path: docs/conformance.json
    intent: "The spec conformance matrix — every KCP layer the agent implements mapped to its implementation file and the CI tests that enforce it"
    scope: project
    audience: [agent, developer]
    triggers: [conformance, matrix, receipts, coverage, spec layers, proof]

  - id: ci-natives
    path: .github/workflows/ci.yml
    intent: "How CI tests the agent and cross-compiles self-contained native executables with Deno"
    scope: project
    audience: [agent, developer]
    triggers: [ci, build, release, compile, workflow]

manifests:
  - id: kcp-spec
    url: "https://raw.githubusercontent.com/Cantara/knowledge-context-protocol/main/knowledge.yaml"
    label: "Knowledge Context Protocol — the spec this agent implements"
    relationship: foundation

signing:
  scheme: ed25519
  scope: this-manifest
  public_key: "MCowBQYDK2VwAyEAuipgusnqU9vjf3p2yPVLD/DmERT6tBbLOqEETdxAhMU="
  signature: "https://raw.githubusercontent.com/Cantara/kcp-agent/main/knowledge.yaml.sig"

# Serving Endpoint Binding (KCP SPEC v0.26 §3.12): authoritative manifest URL
# and authorized MCP representative. Ignored by pre-0.26 verifiers.
serving:
  manifest:
    - https://raw.githubusercontent.com/Cantara/kcp-agent/main/knowledge.yaml
  mcp:
    - https://mcp.cantara.no/mcp
