name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  # Manual/handoff publish: a workflow_dispatch run of THIS file mints an OIDC
  # token whose workflow claim is ci.yml — the workflow npm authorizes as the
  # package's Trusted Publisher. release.yml (a different, unauthorized workflow)
  # dispatches this to publish, and it can also be run by hand to (re)publish
  # the version currently on the dispatched ref.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  natives:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach binaries to the release on tag builds
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run build

      # Deno compiles the tsc output (plain ESM) into self-contained native
      # executables, cross-compiled for every target from this one runner.
      # Permissions are baked in: read (manifests + units), env (API key),
      # net (remote manifests + Claude API).
      - name: Compile native executables
        run: |
          mkdir -p dist-bin
          while read -r target out; do
            deno compile \
              --allow-read --allow-env --allow-net \
              --node-modules-dir=auto \
              --target "$target" \
              --output "dist-bin/$out" \
              dist/cli.js
          done <<'EOF'
          x86_64-unknown-linux-gnu kcp-agent-linux-x64
          aarch64-unknown-linux-gnu kcp-agent-linux-arm64
          x86_64-apple-darwin kcp-agent-macos-x64
          aarch64-apple-darwin kcp-agent-macos-arm64
          x86_64-pc-windows-msvc kcp-agent-windows-x64.exe
          EOF

      - name: Smoke test (linux-x64)
        env:
          ANTHROPIC_API_KEY: ""
        run: |
          # `plan` must work fully offline from the embedded planner.
          ./dist-bin/kcp-agent-linux-x64 plan "how do I deploy to production?" \
            --manifest examples/demo-hub --env prod
          # `validate` must pass on the repo's own manifest and the demo hub.
          ./dist-bin/kcp-agent-linux-x64 validate .
          ./dist-bin/kcp-agent-linux-x64 validate examples/demo-hub
          # `ask` without a key must fail at the API-key check, not at the SDK
          # import — that proves the Claude SDK is embedded in the binary.
          if out=$(./dist-bin/kcp-agent-linux-x64 ask "how do I deploy?" \
            --manifest examples/demo-hub 2>&1); then
            echo "expected ask to fail without an API key" >&2; exit 1
          fi
          echo "$out"
          if echo "$out" | grep -q "needs the Claude SDK"; then
            echo "Claude SDK is not embedded in the binary" >&2; exit 1
          fi
          echo "$out" | grep -q "Could not resolve authentication" || {
            echo "unexpected ask failure" >&2; exit 1
          }

      - name: Checksums
        working-directory: dist-bin
        run: sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: kcp-agent-natives
          path: dist-bin/

      - name: Attach binaries to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-bin/*

  # Publishes kcp-agent to npm via npm Trusted Publishing (OIDC — no token
  # secret). Requires npm >= 11.5.1, hence Node 24. Runs on a v* tag push or on
  # workflow_dispatch (the handoff release.yml uses, and a manual publish path).
  # needs: [test] only — publishing the tarball is independent of the native
  # binaries (natives is skipped on a non-tag dispatch anyway).
  publish:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for trusted publishing + provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          # NB: no registry-url here — setup-node would write an .npmrc with a
          # placeholder NODE_AUTH_TOKEN, which takes precedence over OIDC and
          # makes npm fail the PUT with a masked E404. Trusted Publishing is
          # auto-detected by npm >= 11.5.1 when no token is configured.
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
