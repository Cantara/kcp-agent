name: Java Release

# Build, gate on the conformance vectors, and publish the Java planner to Maven Central
# on a `java-vX.Y.Z` tag. The tag prefix is `java-v*` so it never collides with the npm
# package's `v*` tags or the Rust crate's `rust-v*` tags.
on:
  push:
    tags: ["java-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The vectors gate the release: the reactor must reproduce every conformance vector on
  # both the LTS baseline (17) and current LTS (21) — and build the release artifacts
  # (sources + Javadoc) — or nothing ships.
  gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - run: mvn -B -f java/pom.xml -Prelease -Dgpg.skip=true clean verify

  # Publish both artifacts to Maven Central via the Sonatype Central Portal. Runs only
  # when the publishing credentials are configured — otherwise it is a no-op (the gate
  # already proved the release artifacts build), mirroring the Rust crate's publish gate.
  publish:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Publish to Maven Central
        if: ${{ secrets.CENTRAL_TOKEN != '' && secrets.MAVEN_GPG_PRIVATE_KEY != '' }}
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -f java/pom.xml -Prelease -DskipTests deploy
      - name: Skip publish (no credentials configured)
        if: ${{ secrets.CENTRAL_TOKEN == '' || secrets.MAVEN_GPG_PRIVATE_KEY == '' }}
        run: echo "CENTRAL_TOKEN / MAVEN_GPG_PRIVATE_KEY not set — skipping Maven Central publish (the gate proved the release artifacts build)."

  github-release:
    needs: [gate, publish]
    if: startsWith(github.ref, 'refs/tags/java-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: kcp-planner (Java) ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Java port of the deterministic KCP planner — conformant with the kcp-agent
            TypeScript reference **v0.11.0** (every shared conformance vector reproduced
            byte-for-byte, alongside the Rust port).

            **Artifacts** (Maven Central, `no.cantara.kcp`):
            - `kcp-planner` — the core library (Java 17+, one runtime dependency)
            - `kcp-planner-spring-boot-starter` — Spring Boot 3 auto-configuration
