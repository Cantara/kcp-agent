name: Release

# Cut a release by hand: tags the target ref, cross-compiles the native
# executables, attaches them (checksummed) to a GitHub release, and publishes
# to npm when NPM_TOKEN is configured. Everything happens in this one workflow
# because a tag pushed with GITHUB_TOKEN does not trigger other workflows.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true
      target:
        description: "Ref to tag"
        required: false
        default: "main"

permissions:
  contents: write
  id-token: write # npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "kcp-agent ${{ inputs.version }}"
          git push origin "refs/tags/${{ inputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Compile native executables
        run: |
          mkdir -p dist-bin
          while read -r target out; do
            deno compile \
              --allow-read --allow-env --allow-net \
              --node-modules-dir=auto \
              --target "$target" \
              --output "dist-bin/$out" \
              dist/cli.js
          done <<'EOF'
          x86_64-unknown-linux-gnu kcp-agent-linux-x64
          aarch64-unknown-linux-gnu kcp-agent-linux-arm64
          x86_64-apple-darwin kcp-agent-macos-x64
          aarch64-apple-darwin kcp-agent-macos-arm64
          x86_64-pc-windows-msvc kcp-agent-windows-x64.exe
          EOF

      - name: Smoke test (linux-x64)
        run: |
          ./dist-bin/kcp-agent-linux-x64 plan "how do I deploy to production?" \
            --manifest examples/demo-hub --env prod
          ./dist-bin/kcp-agent-linux-x64 validate .

      - name: Checksums
        working-directory: dist-bin
        run: sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: dist-bin/*

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN is not configured — skipping npm publish. Configure the secret and re-run, or publish manually."
            exit 0
          fi
          npm config set //registry.npmjs.org/:_authToken '${NODE_AUTH_TOKEN}'
          npm publish --provenance --access public
