# Brand & Communications — the most public domain in the estate. Free,
# openly licensed, meant to be quoted. The press kit exists precisely so
# that a comms agent has somewhere legitimate to land when R&D's not_for
# turns it away from the formulations.

kcp_version: "0.25"
project: melkeveien-brand
