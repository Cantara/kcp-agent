# Quaymaster Systems — the vendor (fictional). One security bulletin, free
# and public, and a marketing unit that declares its own negative space:
# `not_for` tells agents what it does NOT serve, so incident-response tasks
# never waste a load on a brochure.

kcp_version: "0.25"
project: quaymaster-broker
version: 1.0.0
updated: "2026-07-08"
language: en

trust:
  provenance:
    publisher: "Quaymaster Systems Ltd (example)"

